name: Build APK (Production)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Node (Capacitor يحتاج 22)
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run build

      # Java
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Android SDK
      - uses: android-actions/setup-android@v3

      # 🔥 أهم خطوة: إعادة إنشاء Android بشكل نظيف
      - run: npx cap sync android

      # 🔥 إعادة بناء Android من الصفر (يولد gradlew تلقائيًا داخل runner)
      - run: cd android && gradle clean
      - run: cd android && gradle assembleDebug

      # رفع APK
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
