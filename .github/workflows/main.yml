name: Build APK (Production)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Node (Capacitor يحتاج 22)
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run build

      # Java (Capacitor/AGP حديث يحتاج 21)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # Android SDK
      - uses: android-actions/setup-android@v3

      # Sync Capacitor
      - run: npx cap sync android

      # 🔥 إجبار Gradle 8.5 (حل مشكلة Gradle 9.6)
      - run: |
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip" > android/gradle/wrapper/gradle-wrapper.properties

      # Build APK
      - run: cd android && gradle assembleDebug

      # Upload APK
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
