name: Build APK (Fresh Android Rebuild)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Node (Capacitor يحتاج 22)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      # Java (متوافق مع Android Gradle)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 🔥 حذف android القديم وإعادة إنشائه من الصفر
      - name: Recreate Android project
        run: |
          rm -rf android
          npx cap add android

      # مزامنة Capacitor
      - name: Sync Capacitor
        run: npx cap sync android

      # بناء APK باستخدام Gradle wrapper الجديد (يتم توليده تلقائياً)
      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      # رفع APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
